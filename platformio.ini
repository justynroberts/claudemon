; claudemon — Sunton ESP32-4848S040C (480x480 capacitive CYD)
;
; Toolchain pins are LOAD-BEARING. Read CLAUDE.md + DEVICE_NOTES.md before
; changing platform, lib_deps, or build_flags.

[platformio]
default_envs = esp32-4848S040CIY1

[env]
; espressif32@6.5.0 — newer platforms rename esp_lcd_panel_disp_off to
; disp_on_off, which smartdisplay calls. Do not bump.
platform = espressif32@6.5.0
framework = arduino

monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = esp32_exception_decoder

upload_speed = 460800

board_build.partitions = huge_app.csv

build_flags =
    -Ofast
    -Wall
    '-D BOARD_NAME="${this.board}"'
    '-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO'
    '-D LV_CONF_PATH="${platformio.include_dir}/lv_conf.h"'
    ; Generated font/image .c files probe for "lvgl.h"; force the simple include.
    -D LV_LVGL_H_INCLUDE_SIMPLE
    ; Halve smartdisplay's internal-SRAM DMA bounce buffer so mbedTLS has
    ; heap for its record buffers if/when we add HTTPS. Note: the board
    ; JSON for the CIY1 already sets the other GT911 / I2C tuning flags;
    ; redefining them here just produces warnings.
    -DSMARTDISPLAY_DMA_BUFFER_SIZE=65536

lib_deps =
    https://github.com/rzeldent/esp32-smartdisplay
    bblanchon/ArduinoJson@^7.1.0

[env:esp32-4848S040CIY1]
board = esp32-4848S040CIY1
